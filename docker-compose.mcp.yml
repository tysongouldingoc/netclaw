services:
  defenseclaw-proxy:
    image: python:3.12-slim
    container_name: defenseclaw-proxy
    command:
      - "python"
      - "-c"
      - "import http.server; http.server.HTTPServer(('0.0.0.0', 4000), type('H', (http.server.BaseHTTPRequestHandler,), {'do_GET': lambda s: (s.send_response(200), s.send_header('Content-Type','application/json'), s.end_headers(), s.wfile.write(b'{\"status\":\"ok\",\"service\":\"defenseclaw-proxy\"}'))})).serve_forever()"
    ports:
      - "4000:4000"
    security_opt:
      - "no-new-privileges:true"
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - defenseclaw_net

  netclaw:
    build: .
    image: netclaw-agent:latest
    container_name: netclaw-agent
    command: python scripts/mcp-installer.py --all --target docker-compose --mode production
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - N2N_RISK_MODE=production
      - DEFENSECLAW_PROXY_URL=http://defenseclaw-proxy:4000
    depends_on:
      - defenseclaw-proxy
    networks:
      - defenseclaw_net

  forward-mcp:
    image: python:3.12-slim
    container_name: mcp-forward-mcp
    command: ["python", "-c", "import time; time.sleep(3600)"]
    security_opt:
      - "no-new-privileges:true"
    read_only: true
    cap_drop:
      - "ALL"
    tmpfs:
      - /tmp
    env_file:
      - "config/env/.env.forward-mcp"
    depends_on:
      - defenseclaw-proxy
    networks:
      - defenseclaw_net

  suzieq-mcp:
